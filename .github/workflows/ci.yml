name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Zig is required by tigerbeetle-unofficial (C library built via Zig cc).
      # It must come before the Rust toolchain so cargo can find `zig` in PATH.
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            clang lld

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Fmt
        run: cargo fmt --all -- --check

  go-ci:
    name: Go CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build all services
        run: |
          for svc in payments banking trading crypto; do
            echo "Building $svc..."
            cd services/$svc && GOWORK=off go build ./... && cd ../..
          done
          for lib in observability secrets auth policy; do
            echo "Building $lib..."
            cd libs/$lib && GOWORK=off go build ./... && cd ../..
          done

      - name: Test all services
        run: |
          for svc in payments banking trading crypto; do
            cd services/$svc && GOWORK=off go test -race ./... && cd ../..
          done
          for lib in observability secrets auth policy; do
            cd libs/$lib && GOWORK=off go test -race ./... && cd ../..
          done

      - name: Vet
        run: |
          for svc in payments banking trading crypto; do
            cd services/$svc && GOWORK=off go vet ./... && cd ../..
          done

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-ci, go-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            clang lld

      - name: Run integration tests
        run: |
          cargo test -p blazil-ledger \
            --features tigerbeetle-client \
            -- --nocapture

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-ci, go-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Build demo stack
        run: |
          docker compose \
            -f infra/docker/docker-compose.demo.yml \
            build

      - name: Validate compose config
        run: |
          docker compose \
            -f infra/docker/docker-compose.demo.yml \
            config --quiet
