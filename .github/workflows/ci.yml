name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      
      - name: Build all crates
        run: cargo build --workspace --all-features --verbose
      
      - name: Run tests
        run: cargo test --workspace --all-features --verbose

  go-ci:
    name: Go CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Go mod tidy (gateway)
        working-directory: ./services/gateway
        run: go mod tidy
      
      - name: Go mod tidy (payments)
        working-directory: ./services/payments
        run: go mod tidy
      
      - name: Go mod tidy (banking)
        working-directory: ./services/banking
        run: go mod tidy
      
      - name: Go mod tidy (trading)
        working-directory: ./services/trading
        run: go mod tidy
      
      - name: Go mod tidy (crypto)
        working-directory: ./services/crypto
        run: go mod tidy
      
      - name: Go mod tidy (compliance)
        working-directory: ./services/compliance
        run: go mod tidy
      
      - name: Build all services
        working-directory: ./services
        run: |
          cd gateway && go build -v ./... && cd ..
          cd payments && go build -v ./... && cd ..
          cd banking && go build -v ./... && cd ..
          cd trading && go build -v ./... && cd ..
          cd crypto && go build -v ./... && cd ..
          cd compliance && go build -v ./...
      
      - name: Run tests
        working-directory: ./services
        run: |
          cd gateway && go test -v ./... && cd ..
          cd payments && go test -v ./... && cd ..
          cd banking && go test -v ./... && cd ..
          cd trading && go test -v ./... && cd ..
          cd crypto && go test -v ./... && cd ..
          cd compliance && go test -v ./...
