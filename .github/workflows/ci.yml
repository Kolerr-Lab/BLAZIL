name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      # Zig is required by tigerbeetle-unofficial (C library built via Zig cc).
      # It must come before the Rust toolchain so cargo can find `zig` in PATH.
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            clang lld \
            cmake g++

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --features blazil-transport/aeron,blazil-transport/io-uring

      - name: Test
        run: cargo test --workspace --features blazil-transport/aeron,blazil-transport/io-uring

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features blazil-transport/aeron,blazil-transport/io-uring -- -D warnings

      - name: Fmt
        run: cargo fmt --all -- --check

  go-ci:
    name: Go CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all services
        run: |
          for svc in payments banking trading crypto gateway; do
            echo "Building $svc..."
            (cd services/$svc && GOWORK=off go build ./...)
          done
          for lib in observability secrets auth policy discovery sharding metering; do
            echo "Building $lib..."
            (cd libs/$lib && GOWORK=off go build ./...)
          done

      - name: Test all services
        run: |
          for svc in payments banking trading crypto gateway; do
            (cd services/$svc && GOWORK=off go test -race ./...)
          done
          for lib in observability secrets auth policy discovery sharding metering; do
            (cd libs/$lib && GOWORK=off go test -race ./...)
          done

      - name: Vet
        run: |
          for svc in payments banking trading crypto gateway; do
            (cd services/$svc && GOWORK=off go vet ./...)
          done
          for lib in observability secrets auth policy discovery sharding metering; do
            (cd libs/$lib && GOWORK=off go vet ./...)
          done

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-ci, go-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            clang lld \
            netcat-openbsd

      - name: Start TigerBeetle
        run: |
          mkdir -p /tmp/tb-data
          # Step 1: format the data file (runs to completion then exits)
          docker run --rm \
            --security-opt seccomp=unconfined \
            -v /tmp/tb-data:/data \
            ghcr.io/tigerbeetle/tigerbeetle:latest \
            format \
            --cluster=0 \
            --replica=0 \
            --replica-count=1 \
            /data/0_0.tigerbeetle
          # Step 2: start the server in the background
          docker run -d \
            --name tigerbeetle \
            --network host \
            --security-opt seccomp=unconfined \
            -v /tmp/tb-data:/data \
            ghcr.io/tigerbeetle/tigerbeetle:latest \
            start \
            --addresses=0.0.0.0:3000 \
            --development \
            /data/0_0.tigerbeetle
          # Wait until TigerBeetle is accepting connections (up to 30s)
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 3000 2>/dev/null; then
              echo "TigerBeetle ready after ${i}s"; break
            fi
            echo "Waiting for TigerBeetle... ($i/30)"
            sleep 1
          done
          docker ps

      - name: Run integration tests
        env:
          BLAZIL_TB_ADDRESS: 127.0.0.1:3000
        run: |
          cargo test -p blazil-ledger \
            --features tigerbeetle-client \
            -- --nocapture

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-ci, go-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (enables BuildKit cache mounts)
        uses: docker/setup-buildx-action@v3

      - name: Cache Zig binary
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-0.14.1-linux-x86_64

      - name: Download Zig (if not cached)
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/zig
          curl -fsSL --retry 5 --retry-delay 10 --connect-timeout 60 --max-time 300 \
            -o ~/.cache/zig/zig-x86_64-linux-0.14.1.tar.xz \
            https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz
          echo "Zig tarball size: $(stat -c%s ~/.cache/zig/zig-x86_64-linux-0.14.1.tar.xz) bytes"

      - name: Copy Zig to Docker build context
        run: |
          cp ~/.cache/zig/zig-x86_64-linux-0.14.1.tar.xz ./zig-x86_64-linux-0.14.1.tar.xz
          ls -lh ./zig-x86_64-linux-0.14.1.tar.xz
          echo "Zig tarball ready for Docker build (project root)"

      - name: Build demo stack
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose \
            -f infra/docker/docker-compose.demo.yml \
            build

      - name: Validate compose config
        run: |
          docker compose \
            -f infra/docker/docker-compose.demo.yml \
            config --quiet

  # ── v0.2: Aeron C FFI transport ──────────────────────────────────────────────
  # Builds the C media driver from the git submodule, then compiles and tests
  # the Rust safe-wrapper layer.  Requires cmake, g++, and the submodule.
  aeron-transport:
    name: Aeron Transport (C FFI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install C build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            pkg-config libssl-dev \
            clang lld

      # Zig is required by blazil-ledger's tigerbeetle-client dev-dependency.
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (Aeron C library + Rust transport)
        run: cargo build --features aeron -p blazil-transport

      - name: Unit tests
        run: cargo test --features aeron -p blazil-transport

      - name: Clippy
        run: cargo clippy --features aeron -p blazil-transport -- -D warnings

  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [rust-ci, go-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write    # OIDC token for keyless Cosign signing
      attestations: write  # SBOM attestation upload to GHCR
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cache Zig binary
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-0.14.1-linux-x86_64

      - name: Download Zig (if not cached)
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/zig
          curl -fsSL --retry 5 --retry-delay 10 --connect-timeout 60 --max-time 300 \
            -o ~/.cache/zig/zig-x86_64-linux-0.14.1.tar.xz \
            https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz

      - name: Copy Zig to Docker build context
        run: cp ~/.cache/zig/zig-x86_64-linux-0.14.1.tar.xz ./zig-x86_64-linux-0.14.1.tar.xz

      - name: Build and push gateway
        id: build-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.gateway
          push: true
          tags: |
            ghcr.io/kolerr-lab/blazil-gateway:latest
            ghcr.io/kolerr-lab/blazil-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for gateway
        uses: anchore/sbom-action@v0.20.0
        with:
          image: ghcr.io/kolerr-lab/blazil-gateway@${{ steps.build-gateway.outputs.digest }}
          artifact-name: sbom-gateway.spdx.json
          output-file: /tmp/sbom-gateway.spdx.json

      - name: Sign gateway image
        run: |
          cosign sign --yes \
            ghcr.io/kolerr-lab/blazil-gateway@${{ steps.build-gateway.outputs.digest }}

      - name: Build and push trading
        id: build-trading
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.trading
          push: true
          tags: |
            ghcr.io/kolerr-lab/blazil-trading:latest
            ghcr.io/kolerr-lab/blazil-trading:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for trading
        uses: anchore/sbom-action@v0.20.0
        with:
          image: ghcr.io/kolerr-lab/blazil-trading@${{ steps.build-trading.outputs.digest }}
          artifact-name: sbom-trading.spdx.json
          output-file: /tmp/sbom-trading.spdx.json

      - name: Sign trading image
        run: |
          cosign sign --yes \
            ghcr.io/kolerr-lab/blazil-trading@${{ steps.build-trading.outputs.digest }}

      - name: Build and push banking
        id: build-banking
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.banking
          push: true
          tags: |
            ghcr.io/kolerr-lab/blazil-banking:latest
            ghcr.io/kolerr-lab/blazil-banking:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for banking
        uses: anchore/sbom-action@v0.20.0
        with:
          image: ghcr.io/kolerr-lab/blazil-banking@${{ steps.build-banking.outputs.digest }}
          artifact-name: sbom-banking.spdx.json
          output-file: /tmp/sbom-banking.spdx.json

      - name: Sign banking image
        run: |
          cosign sign --yes \
            ghcr.io/kolerr-lab/blazil-banking@${{ steps.build-banking.outputs.digest }}

      - name: Build and push crypto
        id: build-crypto
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.crypto
          push: true
          tags: |
            ghcr.io/kolerr-lab/blazil-crypto:latest
            ghcr.io/kolerr-lab/blazil-crypto:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for crypto
        uses: anchore/sbom-action@v0.20.0
        with:
          image: ghcr.io/kolerr-lab/blazil-crypto@${{ steps.build-crypto.outputs.digest }}
          artifact-name: sbom-crypto.spdx.json
          output-file: /tmp/sbom-crypto.spdx.json

      - name: Sign crypto image
        run: |
          cosign sign --yes \
            ghcr.io/kolerr-lab/blazil-crypto@${{ steps.build-crypto.outputs.digest }}

      - name: Build and push payments
        id: build-payments
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.payments
          push: true
          tags: |
            ghcr.io/kolerr-lab/blazil-payments:latest
            ghcr.io/kolerr-lab/blazil-payments:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for payments
        uses: anchore/sbom-action@v0.20.0
        with:
          image: ghcr.io/kolerr-lab/blazil-payments@${{ steps.build-payments.outputs.digest }}
          artifact-name: sbom-payments.spdx.json
          output-file: /tmp/sbom-payments.spdx.json

      - name: Sign payments image
        run: |
          cosign sign --yes \
            ghcr.io/kolerr-lab/blazil-payments@${{ steps.build-payments.outputs.digest }}

      - name: Build and push engine
        id: build-engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.engine
          push: true
          tags: |
            ghcr.io/kolerr-lab/blazil-engine:latest
            ghcr.io/kolerr-lab/blazil-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for engine
        uses: anchore/sbom-action@v0.20.0
        with:
          image: ghcr.io/kolerr-lab/blazil-engine@${{ steps.build-engine.outputs.digest }}
          artifact-name: sbom-engine.spdx.json
          output-file: /tmp/sbom-engine.spdx.json

      - name: Sign engine image
        run: |
          cosign sign --yes \
            ghcr.io/kolerr-lab/blazil-engine@${{ steps.build-engine.outputs.digest }}

      - name: Prepare inference build context
        run: |
          # Some BuildKit versions resolve the per-Dockerfile .dockerignore relative
          # to the context root (basename only) rather than alongside the Dockerfile.
          # Copy it to the context root so Aeron C submodule is included in both cases.
          cp infra/docker/Dockerfile.inference.dockerignore Dockerfile.inference.dockerignore

      - name: Build and push inference
        id: build-inference
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.inference
          push: true
          tags: |
            ghcr.io/kolerr-lab/blazil-inference:latest
            ghcr.io/kolerr-lab/blazil-inference:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for inference
        uses: anchore/sbom-action@v0.20.0
        with:
          image: ghcr.io/kolerr-lab/blazil-inference@${{ steps.build-inference.outputs.digest }}
          artifact-name: sbom-inference.spdx.json
          output-file: /tmp/sbom-inference.spdx.json

      - name: Sign inference image
        run: |
          cosign sign --yes \
            ghcr.io/kolerr-lab/blazil-inference@${{ steps.build-inference.outputs.digest }}

