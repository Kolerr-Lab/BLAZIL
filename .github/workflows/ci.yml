name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-ci:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Zig is required by tigerbeetle-unofficial (C library built via Zig cc).
      # It must come before the Rust toolchain so cargo can find `zig` in PATH.
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            clang lld \
            cmake g++

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --features blazil-transport/aeron,blazil-transport/io-uring

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features blazil-transport/aeron,blazil-transport/io-uring -- -D warnings

      - name: Fmt
        run: cargo fmt --all -- --check

  go-ci:
    name: Go CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all services
        run: |
          for svc in payments banking trading crypto; do
            echo "Building $svc..."
            (cd services/$svc && GOWORK=off go build ./...)
          done
          for lib in observability secrets auth policy discovery sharding; do
            echo "Building $lib..."
            (cd libs/$lib && GOWORK=off go build ./...)
          done

      - name: Test all services
        run: |
          for svc in payments banking trading crypto; do
            (cd services/$svc && GOWORK=off go test -race ./...)
          done
          for lib in observability secrets auth policy discovery sharding; do
            (cd libs/$lib && GOWORK=off go test -race ./...)
          done

      - name: Vet
        run: |
          for svc in payments banking trading crypto; do
            (cd services/$svc && GOWORK=off go vet ./...)
          done
          for lib in observability secrets auth policy discovery sharding; do
            (cd libs/$lib && GOWORK=off go vet ./...)
          done

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-ci, go-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            clang lld \
            netcat-openbsd

      - name: Start TigerBeetle
        run: |
          mkdir -p /tmp/tb-data
          # Step 1: format the data file (runs to completion then exits)
          docker run --rm \
            --security-opt seccomp=unconfined \
            -v /tmp/tb-data:/data \
            ghcr.io/tigerbeetle/tigerbeetle:latest \
            format \
            --cluster=0 \
            --replica=0 \
            --replica-count=1 \
            /data/0_0.tigerbeetle
          # Step 2: start the server in the background
          docker run -d \
            --name tigerbeetle \
            --network host \
            --security-opt seccomp=unconfined \
            -v /tmp/tb-data:/data \
            ghcr.io/tigerbeetle/tigerbeetle:latest \
            start \
            --addresses=0.0.0.0:3000 \
            --development \
            /data/0_0.tigerbeetle
          # Wait until TigerBeetle is accepting connections (up to 30s)
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 3000 2>/dev/null; then
              echo "TigerBeetle ready after ${i}s"; break
            fi
            echo "Waiting for TigerBeetle... ($i/30)"
            sleep 1
          done
          docker ps

      - name: Run integration tests
        env:
          BLAZIL_TB_ADDRESS: 127.0.0.1:3000
        run: |
          cargo test -p blazil-ledger \
            --features tigerbeetle-client \
            -- --nocapture

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-ci, go-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx (enables BuildKit cache mounts)
        uses: docker/setup-buildx-action@v3

      - name: Build demo stack
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose \
            -f infra/docker/docker-compose.demo.yml \
            build

      - name: Validate compose config
        run: |
          docker compose \
            -f infra/docker/docker-compose.demo.yml \
            config --quiet

  # ── v0.2: Aeron C FFI transport ──────────────────────────────────────────────
  # Builds the C media driver from the git submodule, then compiles and tests
  # the Rust safe-wrapper layer.  Requires cmake, g++, and the submodule.
  aeron-transport:
    name: Aeron Transport (C FFI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install C build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            pkg-config libssl-dev \
            clang lld

      # Zig is required by blazil-ledger's tigerbeetle-client dev-dependency.
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (Aeron C library + Rust transport)
        run: cargo build --features aeron -p blazil-transport

      - name: Unit tests
        run: cargo test --features aeron -p blazil-transport

      - name: Clippy
        run: cargo clippy --features aeron -p blazil-transport -- -D warnings

