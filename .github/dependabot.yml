version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Singapore"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"

  # ── Rust / Cargo workspace ────────────────────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Singapore"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(rust)"
    groups:
      rust-workspace:
        patterns:
          - "*"

  # ── Go service: banking ───────────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/services/banking"
