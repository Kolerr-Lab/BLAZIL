# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Security alert suppression policy
# ───────────────────────────────────
# RUSTSEC-2024-0436 (paste — unmaintained, INFO severity, no CVE):
#   paste is a compile-time proc-macro with zero runtime exposure.
#   It is a transitive dependency via tract-linalg ← tract-core ← tract-onnx.
#   There is no patched version; pastey is an alternative but tract has not
#   migrated.  This advisory is suppressed via .cargo/audit.toml and dismissed
#   in the GitHub Security tab.  Re-evaluate when tract >= 0.22 is released.

version: 2
updates:
  # ── Cargo (Rust workspace) ────────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    ignore:
      # paste — unmaintained INFO advisory, no patched version, compile-time
      # proc-macro only, transitive via tract.  Tracked in .cargo/audit.toml.
      - dependency-name: paste
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major

