# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Go modules policy
# ─────────────────
# All 14 go.mod files share the same x/net, x/sys, x/text, chi versions and
# MUST be updated atomically in a single commit (see scripts/check.sh).
# Dependabot cannot coordinate across directories, so version-update PRs for
# gomod are DISABLED (open-pull-requests-limit: 0).
# Security alerts still fire via GitHub's Dependabot alert scanning, which
# operates independently of this file.

version: 2
updates:
  # ── Cargo (Rust workspace) ────────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust

  # ── Go modules (version-update PRs disabled — updated atomically by hand) ─
  - package-ecosystem: gomod
    directory: /services/banking
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /services/crypto
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /services/gateway
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /services/payments
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /services/trading
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /libs/auth
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /libs/discovery
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /libs/metering
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /libs/observability
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /libs/policy
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /libs/secrets
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /libs/sharding
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /tools/loadgen
    schedule:
      interval: weekly
