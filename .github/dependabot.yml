    open-pull-requests-limit: 0

  # ── npm (dashboards) ──────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /tools/ai-dashboard
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - frontend

  - package-ecosystem: npm
    directory: /tools/fintech-dashboard
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
