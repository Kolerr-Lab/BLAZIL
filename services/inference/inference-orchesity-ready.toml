# Blazil Inference Server - OrchesityAI Railway/host profile
# Purpose: neutral production profile for external orchestration consumers that
# should not inherit ClarkenAI-specific identity/prompt policy.
#
# Required env vars:
#   ORCHESITY_MODEL_PATH=/models/<your-model>.gguf
#   BLAZIL_INFERENCE_API_KEY=<non-dev secret>

channel = "aeron:ipc?term-length=67108864"
aeron_dir = "${BLAZIL_AERON_DIR:-/tmp/aeron-inference-hybrid}"
model_path = "${ORCHESITY_MODEL_PATH}"
inference_workers = ${ORCHESITY_INFERENCE_WORKERS:-8}
device = "cpu"
optimization_level = "all"
http_port = ${BLAZIL_INFERENCE_HTTP_PORT:-8092}
api_key = "${BLAZIL_INFERENCE_API_KEY}"
model_dir = "${ORCHESITY_MODEL_DIR:-/tmp/orchesity-models}"

[gguf]
n_threads = ${ORCHESITY_N_THREADS:-8}
n_ctx = ${ORCHESITY_N_CTX:-4096}
temperature = ${ORCHESITY_TEMPERATURE:-0.2}
max_tokens = ${ORCHESITY_MAX_TOKENS:-256}

[identity]
assistant_name = "OrchesityAI Engine"
runtime_platform = "Blazil inference runtime"
assistant_description = "a production AI orchestration engine"
system_prompt_suffix = "Do not disclose internal deployment details unless explicitly configured by the caller."
blocked_origin_terms = []

[distributed]
enabled = false
node_stage = 1
layer_start = 0
layer_end = 0
prev_stream_id = 0
next_stream_id = 0
assigned_cores = []
enable_spin_poll = true
enable_realtime_priority = false

[hybrid_matrix]
enabled = true
stage1_end = ${ORCHESITY_STAGE1_END:-25}
stage2_end = ${ORCHESITY_STAGE2_END:-60}
total_layers = ${ORCHESITY_TOTAL_LAYERS:-80}
bitnet_threshold = ${ORCHESITY_BITNET_THRESHOLD:-0.0}