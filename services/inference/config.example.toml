# Blazil Inference Server Configuration

# Aeron IPC channel URI
# Default: "aeron:ipc?term-length=67108864" (64 MB log buffer)
channel = "aeron:ipc?term-length=67108864"

# Aeron IPC directory (shared memory)
# Linux: /dev/shm (tmpfs, zero page-fault latency)
# macOS: /tmp
aeron_dir = "/dev/shm/aeron-inference"

# Path to ONNX model file
model_path = "/path/to/model.onnx"

# Number of inference worker threads
# 0 = auto (num_cpus)
inference_workers = 8

# Device: "cpu", "cuda", "tensorrt"
device = "cpu"

# Optimization level: "disable", "basic", "extended", "all"
optimization_level = "basic"

# HTTP server port.
# Serves all endpoints on a single port:
#   GET  /health       — liveness probe (no auth required)
#   GET  /metrics      — Prometheus text exposition (no auth required)
#   POST /v1/infer     — run inference  (requires Authorization: Bearer <key>)
#   POST /v1/models    — upload a model (requires Authorization: Bearer <key>)
#   …
# Default: 8090
http_port = 8090

# API key for Authorization: Bearer auth on /v1/** endpoints.
# If empty here, the server reads BLAZIL_INFERENCE_API_KEY from the environment.
api_key = ""

# Root directory for per-tenant ONNX model storage.
# Layout: <model_dir>/<tenant_id>/<model_id>/<version>/model.onnx
model_dir = "/var/lib/blazil/models"
