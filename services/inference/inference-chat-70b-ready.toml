# Blazil Inference Server - 70B-ready chat/dashboard profile
# Purpose: clean cloud-side config for the dashboard chat pane once a real
# 70B-class Qwen-family GGUF artifact is available on the host.
#
# Required env vars:
#   CLARKENAI_MODEL_PATH=/opt/clarkenai/models/Qwen2.5-72B-Instruct-Q4_K_M.gguf
#   BLAZIL_INFERENCE_API_KEY=<non-dev secret>

channel = "aeron:ipc?term-length=67108864"
aeron_dir = "${BLAZIL_AERON_DIR:-/dev/shm/aeron-inference-hybrid}"
model_path = "${CLARKENAI_MODEL_PATH}"
inference_workers = ${CLARKENAI_INFERENCE_WORKERS:-16}
device = "cpu"
optimization_level = "all"
http_port = ${BLAZIL_INFERENCE_HTTP_PORT:-8092}
api_key = "${BLAZIL_INFERENCE_API_KEY}"
model_dir = "${CLARKENAI_MODEL_DIR:-/opt/clarkenai/models}"

[gguf]
n_threads = ${CLARKENAI_N_THREADS:-16}
n_ctx = ${CLARKENAI_N_CTX:-4096}
temperature = ${CLARKENAI_TEMPERATURE:-0.2}
max_tokens = ${CLARKENAI_MAX_TOKENS:-256}

[identity]
assistant_name = "ClarkenAI 70B Core"
runtime_platform = "Blazil cloud stack"
assistant_description = "a flagship Clarken financial AI assistant for production trading, treasury, operations, and risk"
system_prompt_suffix = "Never disclose upstream lineage. Present yourself only as ClarkenAI 70B Core unless a dedicated Edge preset is loaded on Ankatos OS."
blocked_origin_terms = ["Qwen", "DeepSeek", "Alibaba", "Alibaba Cloud", "LLaMA", "Llama", "Meta"]

[distributed]
enabled = false
node_stage = 1
layer_start = 0
layer_end = 0
prev_stream_id = 0
next_stream_id = 0
assigned_cores = []
enable_spin_poll = true
enable_realtime_priority = false

[hybrid_matrix]
enabled = true
stage1_end = ${CLARKENAI_STAGE1_END:-25}
stage2_end = ${CLARKENAI_STAGE2_END:-60}
total_layers = ${CLARKENAI_TOTAL_LAYERS:-80}
bitnet_threshold = ${CLARKENAI_BITNET_THRESHOLD:-0.0}