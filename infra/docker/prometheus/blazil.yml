groups:
  - name: blazil_alerts
    interval: 30s
    rules:
      # ── Transaction throughput ──────────────────────────────────────────────
      - alert: TransactionThroughputLow
        expr: |
          sum(rate(blazil_transactions_total[5m])) < 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Transaction throughput is critically low"
          description: "Total transaction rate is {{ $value | humanize }} TPS over the last 5m"

      # ── Transaction error rate ──────────────────────────────────────────────
      - alert: TransactionErrorRateHigh
        expr: |
          sum(rate(blazil_transactions_total{status!="success",status!="settled",status!="cleared"}[5m]))
            /
          sum(rate(blazil_transactions_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Transaction error rate exceeds 5 %"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5m"

      # ── Ring buffer pressure ────────────────────────────────────────────────
      - alert: RingBufferHighUtilization
        expr: blazil_ring_buffer_utilization_ratio > 0.80
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ring buffer utilization above 80 %"
          description: "Ring buffer is {{ $value | humanizePercentage }} full — back-pressure active"

      # ── Service availability ────────────────────────────────────────────────
      - alert: ServiceDown
        expr: up{job=~"blazil-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Blazil service {{ $labels.job }} is unreachable"
          description: "Metrics endpoint for {{ $labels.job }} has been down for more than 2 minutes"
