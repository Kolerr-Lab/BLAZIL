# Prometheus configuration for Blazil 3-node cluster.
# Scrapes engine metrics from all three nodes.
# Node-1: locally via Docker bridge (container name).
# Nodes 2+3: via file_sd — target files written by do-start.sh with real IPs.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Node-1 engine — same Docker bridge, use container name directly.
  - job_name: blazil-engine-node-1
    static_configs:
      - targets: ['blazil-engine:9090']
        labels:
          node: 'node-1'
          shard: '0'

  # Node-2 engine — separate host; targets written by do-start.sh.
  - job_name: blazil-engine-node-2
    file_sd_configs:
      - files: ['/etc/prometheus/targets/node-2.yml']
        refresh_interval: 30s

  # Node-3 engine — separate host; targets written by do-start.sh.
  - job_name: blazil-engine-node-3
    file_sd_configs:
      - files: ['/etc/prometheus/targets/node-3.yml']
        refresh_interval: 30s

  # Node-1 payments service — same Docker bridge.
  - job_name: blazil-payments-node-1
    static_configs:
      - targets: ['blazil-payments:9091']
        labels:
          node: 'node-1'
          shard: '0'
          service: 'payments'
