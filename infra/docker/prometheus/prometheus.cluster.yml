# Prometheus configuration for Blazil 3-node cluster.
# Scrapes engine metrics from all three nodes via the Docker bridge network.
# Each engine exposes Prometheus metrics at container port 9090.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: blazil-node-1
    static_configs:
      - targets: ['blazil-node-1:9090']
        labels:
          node: 'node-1'
          shard: '0'

  - job_name: blazil-node-2
    static_configs:
      - targets: ['blazil-node-2:9090']
        labels:
          node: 'node-2'
          shard: '1'

  - job_name: blazil-node-3
    static_configs:
      - targets: ['blazil-node-3:9090']
        labels:
          node: 'node-3'
          shard: '2'

  - job_name: blazil-payments-node-1
    static_configs:
      - targets: ['blazil-node-1-payments:9091']
        labels:
          node: 'node-1'
          shard: '0'
          service: 'payments'

  - job_name: blazil-payments-node-2
    static_configs:
      - targets: ['blazil-node-2-payments:9091']
        labels:
          node: 'node-2'
          shard: '1'
          service: 'payments'

  - job_name: blazil-payments-node-3
    static_configs:
      - targets: ['blazil-node-3-payments:9091']
        labels:
          node: 'node-3'
          shard: '2'
          service: 'payments'
