---
# Headless service: gives TigerBeetle pods stable DNS but TB uses IPs directly
apiVersion: v1
kind: Service
metadata:
  name: tigerbeetle-headless
  namespace: blazil
  labels:
    app.kubernetes.io/name: tigerbeetle
    app.kubernetes.io/component: ledger
spec:
  clusterIP: None
  selector:
    app: tigerbeetle
  ports:
    - name: vsr
      port: 3000
      protocol: TCP
---
# ClusterIP service for engine → TB connections (port 3000 on each replica)
apiVersion: v1
kind: Service
metadata:
  name: tigerbeetle
  namespace: blazil
  labels:
    app.kubernetes.io/name: tigerbeetle
    app.kubernetes.io/component: ledger
spec:
  selector:
    app: tigerbeetle
  ports:
    - name: vsr-0
      port: 3000
      targetPort: 3000
    - name: vsr-1
      port: 3001
      targetPort: 3001
    - name: vsr-2
      port: 3002
      targetPort: 3002
  type: ClusterIP
