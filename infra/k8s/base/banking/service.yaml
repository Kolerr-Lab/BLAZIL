apiVersion: v1
kind: Service
metadata:
  name: blazil-banking
  namespace: blazil
  labels:
    app.kubernetes.io/name: blazil-banking
    app.kubernetes.io/component: banking
spec:
  selector:
    app: blazil-banking
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
    - name: metrics
      port: 9092
      targetPort: 9092
  type: LoadBalancer
