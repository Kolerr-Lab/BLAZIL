# External LoadBalancer: customer-facing gRPC only (port 50050).
# Admin (8080) and metrics (9090) are intentionally NOT included here.
apiVersion: v1
kind: Service
metadata:
  name: blazil-gateway
  namespace: blazil
  labels:
    app.kubernetes.io/name: blazil-gateway
    app.kubernetes.io/component: gateway
spec:
  selector:
    app: blazil-gateway
  ports:
    - name: grpc
      port: 50050
      targetPort: 50050
  type: LoadBalancer
---
# Internal ClusterIP: admin REST + Prometheus metrics, never reachable from
# outside the cluster. Scraped by Prometheus and reachable by operators via
# kubectl port-forward only.
apiVersion: v1
kind: Service
metadata:
  name: blazil-gateway-internal
  namespace: blazil
  labels:
    app.kubernetes.io/name: blazil-gateway
    app.kubernetes.io/component: gateway
spec:
  selector:
    app: blazil-gateway
  ports:
    - name: admin
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
