apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blazil

resources:
  - ../../base

patches:
  # Engine: production resource limits (full node allocation)
  - target:
      kind: StatefulSet
      name: blazil-engine
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "6"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "8"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "8Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "14Gi"

  # Payments: scale to 6 replicas in production (2 per node)
  - target:
      kind: Deployment
      name: blazil-payments
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 6

  # Grafana: disable anonymous access in production
  - target:
      kind: Deployment
      name: grafana
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "false"

  # Enable auth in production
  - target:
      kind: ConfigMap
      name: blazil-cluster
    patch: |-
      - op: replace
        path: /data/BLAZIL_AUTH_REQUIRED
        value: "true"

configMapGenerator:
  - name: grafana-dashboards-data
    files:
      - ../../../docker/grafana/provisioning/dashboards/blazil-overview.json
      - ../../../docker/grafana/provisioning/dashboards/blazil-trading.json
    options:
      disableNameSuffixHash: true

images:
  - name: ghcr.io/kolerr-lab/blazil-engine
    newTag: "v0.2"
  - name: ghcr.io/kolerr-lab/blazil-payments
    newTag: "v0.2"
  - name: ghcr.io/kolerr-lab/blazil-banking
    newTag: "v0.2"
  - name: ghcr.io/kolerr-lab/blazil-trading
    newTag: "v0.2"
  - name: ghcr.io/kolerr-lab/blazil-crypto
    newTag: "v0.2"
