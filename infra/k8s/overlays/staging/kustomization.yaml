apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blazil

resources:
  - ../../base

patches:
  # Staging: reduced replicas (1 engine, 1 of each service)
  - target:
      kind: StatefulSet
      name: blazil-engine
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
      name: tigerbeetle
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: blazil-payments
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: blazil-banking
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: blazil-trading
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: blazil-crypto
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Staging: reduced resource limits
  - target:
      kind: StatefulSet
      name: blazil-engine
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"

images:
  - name: ghcr.io/kolerr-lab/blazil-engine
    newTag: "staging"
  - name: ghcr.io/kolerr-lab/blazil-payments
    newTag: "staging"
  - name: ghcr.io/kolerr-lab/blazil-banking
    newTag: "staging"
  - name: ghcr.io/kolerr-lab/blazil-trading
    newTag: "staging"
  - name: ghcr.io/kolerr-lab/blazil-crypto
    newTag: "staging"
