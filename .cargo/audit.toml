# cargo audit configuration — workspace security policy
# Run: cargo audit
# CI gate is in scripts/check.sh (step 5).
#
# Any entry in [[advisories.ignore]] MUST have a documented rationale and
# a re-evaluation date.  Never ignore a CRITICAL/HIGH severity advisory here;
# those MUST be fixed in the dependency tree or via an upstream patch.

[advisories]
# Temporary allowlist for warning-only transitive dependencies with no clean
# replacement in the current tokenizers/candle compatibility graph.
#
# Re-evaluate on every dependency bump and remove as soon as upstreams migrate.
ignore = [
	# tokenizers -> indicatif -> number_prefix. Warning-only, unmaintained crate
	# with no upstream fix path available from this workspace today.
	# Re-evaluate by 2026-08-01.
	"RUSTSEC-2025-0119",

	# tokenizers/candle/gemm graph still pulls paste 1.0.x transitively.
	# This is warning-only and currently upstream-controlled.
	# Re-evaluate by 2026-08-01.
	"RUSTSEC-2024-0436",
]
