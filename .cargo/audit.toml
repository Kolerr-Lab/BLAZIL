# cargo audit configuration — workspace security policy
# Run: cargo audit
# CI gate is in scripts/check.sh (step 5).
#
# Any entry in [[advisories.ignore]] MUST have a documented rationale and
# a re-evaluation date.  Never ignore a CRITICAL/HIGH severity advisory here;
# those MUST be fixed in the dependency tree or via an upstream patch.

[advisories]
# RUSTSEC-2024-0436 — paste (dtolnay) is archived / unmaintained.
# Root cause: tract-linalg 0.21.10 ← tract-core ← tract-onnx ← blazil-inference.
# paste is a compile-time proc-macro with no runtime execution surface and no
# known CVE.  There is no patched version and no drop-in replacement in tract's
# dependency tree.
# Re-evaluate when tract >= 0.22 is released or when tract drops paste.
ignore = ["RUSTSEC-2024-0436"]
